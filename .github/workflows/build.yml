name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
      - name: Unit Tests
        run: ./gradlew testCoreDebugUnitTest testFullDebugUnitTest
      - name: Build Core APK
        run: ./gradlew assembleCoreDebug
      - name: Build Full APK
        run: ./gradlew assembleFullDebug
      - name: Verify no INTERNET in core
        run: |
          PERMS=$(aapt dump permissions app/build/outputs/apk/core/debug/app-core-debug.apk)
          if echo "$PERMS" | grep -q "android.permission.INTERNET"; then
            echo "FAIL: INTERNET permission found in core flavor!"
            exit 1
          fi
          echo "OK: No INTERNET permission in core flavor"

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Release APKs
        run: ./gradlew assembleCoreRelease assembleFullRelease
      - name: Compute SHA-256
        run: |
          sha256sum app/build/outputs/apk/core/release/*.apk > checksums.txt
          sha256sum app/build/outputs/apk/full/release/*.apk >> checksums.txt
          cat checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/core/release/*.apk
            app/build/outputs/apk/full/release/*.apk
            checksums.txt
          body: |
            ## Stukachoff ${{ github.ref_name }}

            ### Версии
            - `stukachoff-core.apk` — без INTERNET permission. Физически не может отправить данные наружу.
            - `stukachoff-full.apk` — с проверкой exit IP и обновлением базы угроз.

            ### Проверка подлинности
            Сверь SHA-256 из файла `checksums.txt` перед установкой.

            ### Исходный код
            Reproducible build: собери сам и сравни хеш.
