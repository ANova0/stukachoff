name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Пробуем signed release, fallback на debug
      - name: Try signed Release APK
        id: signed
        continue-on-error: true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No keystore secrets — skipping signed build"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Fallback to Debug APK
        if: steps.signed.outcome == 'failure'
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk stukachoff.apk
            echo "BUILD_TYPE=release (signed)" > build_info.txt
          else
            cp app/build/outputs/apk/debug/app-debug.apk stukachoff.apk
            echo "BUILD_TYPE=debug (unsigned)" > build_info.txt
          fi
          sha256sum stukachoff.apk > checksums.txt
          cat checksums.txt
          cat build_info.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            stukachoff.apk
            checksums.txt
          body: |
            ## Stukachoff ${{ github.ref_name }}

            ### Установка
            1. Скачай `stukachoff.apk`
            2. Проверь SHA-256 из `checksums.txt`
            3. Установи APK

            ### Что нового
            - Определение активного VPN-клиента
            - Оценка устойчивости к ТСПУ
            - Обнаружение WARP-обёртки
            - Критическая уязвимость SOCKS5 прокси
            - Раздельное туннелирование — рекомендации
            - Учебник защиты с пошаговыми инструкциями
